syntax = "proto3";

package loom.v1;

import "loom/v1/common.proto";

// Enrollment & identity (agent-protocol.md §3a). The token-only bootstrap connection
// carries an EnrollRequest with a CSR; the control plane returns a signed node cert in
// EnrollGrant. RotateCert reuses the CSR flow over an already-authenticated connection.

// Node hardware advertised at enrollment. The backend-capability fields (backends,
// memory_model, unified_memory_mb, backend_runtimes) are the ADR-0015 additive extension
// the scheduler filters placement on (compute-backends.md).
message HardwareInventory {
  string gpu_model = 1;
  uint64 vram_mb = 2;
  string driver_version = 3;
  string cuda_version = 4;
  uint32 pcie_gen = 5;
  bool ecc = 6;
  uint32 power_cap_w = 7;
  uint32 thermal_cap_c = 8;
  repeated Backend backends = 9;
  MemoryModel memory_model = 10;
  uint64 unified_memory_mb = 11;
  repeated BackendRuntime backend_runtimes = 12;
}

// A backend and the runtime version the node offers for it (e.g. mlx-lm X.Y).
message BackendRuntime {
  Backend backend = 1;
  string version = 2;
}

// Achieved-performance fingerprint measured locally at enrollment (agent-protocol.md §3a).
message BenchmarkFingerprint {
  double tflops = 1;
  double mem_bandwidth_gbps = 2;
  uint64 timing_p50_us = 3;
  uint64 timing_p99_us = 4;
}

// NAT reflexive address + classification (networking.md §3).
message NatProbeResult {
  string reflexive_addr = 1;
  NatClass nat_class = 2;
}

enum NatClass {
  NAT_CLASS_UNSPECIFIED = 0;
  NAT_CLASS_OPEN = 1;
  NAT_CLASS_CONE = 2;
  NAT_CLASS_SYMMETRIC = 3;
}

// Control-plane-pushed agent configuration (agent-protocol.md §3a/§3h). Values are upper
// bounds intersected with local policy — a push can tighten but never widen an owner cap.
message AgentConfig {
  uint32 heartbeat_interval_ms = 1;
  uint64 spool_cap_bytes = 2;
  string control_endpoint = 3;
  repeated string chosen_tiers = 4;
  string config_version = 5;
}

message EnrollRequest {
  // Single-use enrollment token; only present on the token-only bootstrap connection.
  string enroll_token = 1;
  // PKCS#10 CSR, DER-encoded. The private key never leaves the host.
  bytes csr_der = 2;
  HardwareInventory hw = 3;
  BenchmarkFingerprint bench = 4;
  NatProbeResult nat = 5;
  VersionRange supported_versions = 6;
}

message EnrollGrant {
  string agent_id = 1;
  // CA-signed long-lived node cert (CN/SAN = agent_id).
  bytes node_cert_der = 2;
  bytes ca_chain_der = 3;
  AgentConfig config = 4;
  uint32 chosen_version = 5;
}

// Gateway → agent: re-run enrollment (e.g. to re-verify).
message ReEnroll {
  string reason = 1;
}

// Agent → gateway over authenticated mTLS: rotate the node cert. Replies EnrollGrant-shaped.
message RotateCert {
  bytes csr_der = 1;
}
