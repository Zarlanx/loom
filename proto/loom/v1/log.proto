syntax = "proto3";

package loom.v1;

// Log streaming (agent-protocol.md §3e). LogChunk rides the backpressured log stream and
// may lag; on overflow the agent drops oldest and emits a chunk with dropped_marker set.

enum LogStream {
  LOG_STREAM_UNSPECIFIED = 0;
  LOG_STREAM_STDOUT = 1;
  LOG_STREAM_STDERR = 2;
  LOG_STREAM_EVENT = 3;
}

message LogChunk {
  string attempt_id = 1;
  LogStream stream = 2;
  uint64 seq = 3;
  bytes data = 4;
  // True on the synthetic chunk that reports a drop-oldest overflow.
  bool dropped_marker = 5;
  uint64 dropped_count = 6;
}
