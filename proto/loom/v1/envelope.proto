syntax = "proto3";

package loom.v1;

import "loom/v1/enrollment.proto";
import "loom/v1/health.proto";
import "loom/v1/job.proto";
import "loom/v1/log.proto";

// Envelope wraps every wire message (agent-protocol.md §2.2). Every frame on the
// control/heartbeat/log/metering streams carries exactly one Envelope.
//
// The `oneof body` carries the M1 message set only. Field numbers match the catalog in
// agent-protocol.md §2.2 exactly, so the deferred message families slot into their
// reserved numbers additively — never a renumbering (§2.3).
message Envelope {
  // Semver-major of the message schema (agent-protocol.md §2.3). Minor/patch changes
  // are additive fields and require no bump.
  uint32 protocol_version = 1;
  // ULID, unique per sender per connection.
  string msg_id = 2;
  // Echoes the msg_id this message responds to; empty if unsolicited.
  string correlation_id = 3;
  // Sender wall clock, milliseconds since the Unix epoch. Advisory only — billing
  // durations derive from monotonic counters, never wall-clock deltas (agent-protocol.md §3b).
  int64 timestamp_ms = 4;

  // Body field numbers deliberately NOT frozen in M1, reserved so a later PR adds them
  // additively at their catalog number (agent-protocol.md §2.2):
  //   35, 36   checkpoint  (JobCheckpointRequest / JobCheckpointed)          — PR-17
  //   40..43   serving     (ReplicaPlace / ReplicaReady / ReplicaDrain / …)  — PR-19
  //   51       artifacts   (ArtifactUploadGrant)                             — PR-14
  //   60, 61   metering    (UsageRecord / UsageAck)                          — PR-27
  //   70       attestation (AttestationQuote, Tier C)                        — security §6
  //   80..83   agent ops   (UpdateAvailable / UpdateApplied / ConfigPush / Drain)
  reserved 35, 36, 40 to 43, 51, 60, 61, 70, 80 to 83;

  oneof body {
    // enrollment & identity
    EnrollRequest enroll_request = 10;
    EnrollGrant enroll_grant = 11;
    ReEnroll re_enroll = 12;
    RotateCert rotate_cert = 13;
    // presence & health
    Heartbeat heartbeat = 20;
    StateReport state_report = 21;
    // job lifecycle (checkpoint 35/36 reserved above)
    JobOffer job_offer = 30;
    JobAccept job_accept = 31;
    JobReject job_reject = 32;
    JobPrepareProgress job_prepare_progress = 33;
    JobStarted job_started = 34;
    JobCompleted job_completed = 37;
    JobFailed job_failed = 38;
    JobAbort job_abort = 39;
    // logs
    LogChunk log_chunk = 50;
  }
}
