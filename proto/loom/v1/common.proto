syntax = "proto3";

package loom.v1;

// Shared primitives referenced across the M1 message set.

// Inclusive range of supported schema major versions. The agent advertises its range;
// the control plane picks the highest mutually-supported major (agent-protocol.md §2.3).
message VersionRange {
  uint32 min = 1;
  uint32 max = 2;
}

// The compute backend a node can run or a job requires (ADR-0015, compute-backends.md).
// Scheduler placement filters on this: a `mlx` job only matches `mlx`-capable nodes.
enum Backend {
  BACKEND_UNSPECIFIED = 0;
  BACKEND_MLX = 1;
  BACKEND_CUDA = 2;
  BACKEND_CPU = 3;
  BACKEND_ROCM = 4;
}

// How a node's accelerator memory is addressed — unified (Apple silicon) vs. discrete
// VRAM (NVIDIA/AMD). Drives the memory model the estimator and scheduler reason over
// (compute-backends.md).
enum MemoryModel {
  MEMORY_MODEL_UNSPECIFIED = 0;
  MEMORY_MODEL_UNIFIED = 1;
  MEMORY_MODEL_DISCRETE_VRAM = 2;
}
